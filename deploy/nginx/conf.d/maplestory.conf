# 冒险岛079 Nginx 反向代理配置

upstream maplestory_backend {
    server server:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;

    # 客户端静态资源（如果使用 Nginx 托管 Flutter Web）
    # root /var/www/maplestory_client;
    # index index.html;

    # 全局超时设置
    client_max_body_size 10M;
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml;

    # REST API 反向代理
    location /api/ {
        proxy_pass http://maplestory_backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 缓存（可选：对GET接口进行短时间缓存）
        # proxy_cache api_cache;
        # proxy_cache_valid 200 10s;
        # proxy_cache_methods GET HEAD;

        access_log /var/log/nginx/maplestory_api_access.log;
        error_log /var/log/nginx/maplestory_api_error.log warn;
    }

    # WebSocket 反向代理
    location /ws {
        proxy_pass http://maplestory_backend;
        proxy_http_version 1.1;

        # WebSocket 必需的头部
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 保持长连接
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # 源 IP 传递
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 缓冲区配置
        proxy_buffering off;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        access_log /var/log/nginx/maplestory_ws_access.log;
        error_log /var/log/nginx/maplestory_ws_error.log warn;
    }

    # 健康检查（透传到后端）
    location /health {
        proxy_pass http://maplestory_backend/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # 静态文件缓存头（如果使用 Nginx 托管客户端文件）
    # location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }

    # 安全头
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

