name: maplestory_client
description: MapleStory 079 Client - Flutter implementation
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  web_socket_channel: ^2.4.0
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  audioplayers: ^5.1.0
  flame: ^1.10.1
  flame_audio: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/ui/login/
    - assets/images/ui/login/back/
    - assets/scenes/
    - assets/maps/
    - assets/maps/back/
    - assets/maps/back/grassySoil/
    - assets/maps/tiles/
    - assets/maps/tiles/grassySoil/
    - assets/maps/obj/
    - assets/maps/obj/acc1/
    - assets/maps/obj/acc8/
    - assets/maps/obj/connect/
    - assets/maps/obj/door/
    - assets/maps/obj/guide/
    - assets/maps/obj/house/
    - assets/maps/obj/houseGS/
    - assets/maps/obj/innSystemTW/
    - assets/maps/obj/signboard/
    - assets/maps/tiles/grassySoil/
    - assets/maps/tiles/woodMarble/
    - assets/audio/
    # Flutter 目录声明不含子目录，必须分别列出
    - assets/sprites/mob/
    - assets/sprites/npc/
    - assets/sprites/player/
    - assets/sprites/item/
    - assets/sprites/portal/
    - assets/images/tiles/
    - assets/characters/parts/
    - assets/characters/avatars/
