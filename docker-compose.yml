version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: maplestory-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-maplestory}
      MYSQL_USER: ${MYSQL_USER:-maplestory}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-maplestory}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=64M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maplestory-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - SERVER_MODE=debug
      - DATABASE_HOST=mysql
      - DATABASE_PORT=3306
      - DATABASE_USERNAME=${MYSQL_USER:-maplestory}
      - DATABASE_PASSWORD=${MYSQL_PASSWORD:-maplestory}
      - DATABASE_DATABASE=${MYSQL_DATABASE:-maplestory}
      - DATABASE_AUTO_MIGRATE=true
      - TZ=Asia/Shanghai
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config:ro

  adminer:
    image: adminer:latest
    container_name: maplestory-adminer
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=mysql
      - TZ=Asia/Shanghai

volumes:
  mysql_data:
